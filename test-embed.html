<!DOCTYPE html>
<html>
<head>
  <title>Embed Test</title>
  <style>
    body { font-family: system-ui; background: #f5f5f5; padding: 40px; }
    h1 { font-size: 18px; }
    .test { margin: 24px 0; }
    .test h2 { font-size: 14px; color: #666; margin-bottom: 8px; }
    iframe { border: 1px solid #ddd; border-radius: 8px; }
    #log { background: #1a1f35; color: #0f0; padding: 12px; font-family: monospace; font-size: 12px; border-radius: 6px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
    button { padding: 6px 14px; margin: 4px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>EgoLens — Embed Test Page</h1>

  <div class="test">
    <h2>1. Full controls (default)</h2>
    <iframe id="viewer"
      src="http://localhost:5173/egolens/?dataset=argoverse2&data=https://argoverse.s3.us-east-1.amazonaws.com/datasets/av2/sensor/train/00a6ffc1-6ce9-3bc3-a060-6006e9893a1a/&embed=true"
      width="900" height="500"
      sandbox="allow-scripts allow-same-origin"
    ></iframe>
  </div>

  <div class="test">
    <h2>2. postMessage controls</h2>
    <button onclick="send('play')">Play</button>
    <button onclick="send('pause')">Pause</button>
    <button onclick="sendFrame(0)">Frame 0</button>
    <button onclick="sendFrame(10)">Frame 10</button>
    <button onclick="sendFrame(50)">Frame 50</button>
    <button onclick="sendColormap('distance')">Colormap: distance</button>
    <button onclick="sendColormap('intensity')">Colormap: intensity</button>
    <button onclick="send('getState')">Get State</button>
  </div>

  <div class="test">
    <h2>3. postMessage log</h2>
    <div id="log">(waiting for messages...)</div>
  </div>

  <script>
    const iframe = document.getElementById('viewer')
    const log = document.getElementById('log')

    function send(type) {
      iframe.contentWindow.postMessage({ type }, '*')
      addLog(`→ sent: ${type}`)
    }

    function sendFrame(n) {
      iframe.contentWindow.postMessage({ type: 'setFrame', frame: n }, '*')
      addLog(`→ sent: setFrame(${n})`)
    }

    function sendColormap(c) {
      iframe.contentWindow.postMessage({ type: 'setColormap', colormap: c }, '*')
      addLog(`→ sent: setColormap(${c})`)
    }

    window.addEventListener('message', (e) => {
      if (e.data && e.data.type) {
        addLog(`← recv: ${JSON.stringify(e.data)}`)
      }
    })

    function addLog(msg) {
      const time = new Date().toLocaleTimeString()
      log.textContent += `[${time}] ${msg}\n`
      log.scrollTop = log.scrollHeight
    }
  </script>
</body>
</html>
