<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AV2 S3 CORS Verification</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #0d1117; color: #c9d1d9; }
    h1 { color: #58a6ff; }
    h2 { color: #8b949e; font-size: 16px; margin-top: 32px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    .test { margin: 12px 0; padding: 12px 16px; border-radius: 8px; background: #161b22; border: 1px solid #30363d; }
    .test h3 { margin: 0 0 8px; font-size: 14px; }
    .pass { border-color: #238636; }
    .fail { border-color: #da3633; }
    .warn { border-color: #d29922; }
    .info { border-color: #388bfd; }
    .pass h3::before { content: "\u2705 "; }
    .fail h3::before { content: "\u274c "; }
    .warn h3::before { content: "\u26a0\ufe0f "; }
    .info h3::before { content: "\u2139\ufe0f "; }
    pre { background: #0d1117; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 12px; color: #8b949e; margin: 4px 0 0; white-space: pre-wrap; word-break: break-all; }
    button { background: #238636; color: white; border: none; padding: 10px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; margin: 16px 0; }
    button:hover { background: #2ea043; }
    button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
    #results { margin-top: 20px; }
    .summary { margin-top: 24px; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; }
    .summary.ok { background: #0d2818; border: 1px solid #238636; color: #3fb950; }
    .summary.blocked { background: #2d1014; border: 1px solid #da3633; color: #f85149; }
    .summary.partial { background: #2d2200; border: 1px solid #d29922; color: #d29922; }
    code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; font-size: 13px; }
    th, td { padding: 8px 12px; border: 1px solid #30363d; text-align: left; }
    th { background: #161b22; color: #58a6ff; }
    td.yes { color: #3fb950; }
    td.no { color: #f85149; }
    td.na { color: #8b949e; }
  </style>
</head>
<body>
  <h1>AV2 S3 CORS Verification</h1>
  <p>
    Tests cross-origin browser access to the Argoverse 2 S3 bucket using <strong>real metadata files</strong>
    from a known train log (<code>00a6ffc1-6ce9-3bc3-a060-6006e9893a1a</code>).
  </p>
  <p style="color: #8b949e; font-size: 13px;">
    Bucket: <code>s3://argoverse</code> &rarr;
    <code>https://argoverse.s3.us-east-1.amazonaws.com</code>
  </p>

  <button id="runBtn" onclick="runTests()">Run CORS Tests</button>

  <div id="results"></div>

  <script>
    const BASE = 'https://argoverse.s3.us-east-1.amazonaws.com'
    const LOG_ID = '00a6ffc1-6ce9-3bc3-a060-6006e9893a1a'
    const LOG_BASE = `${BASE}/datasets/av2/sensor/train/${LOG_ID}`

    const TEST_FILES = {
      annotations: `${LOG_BASE}/annotations.feather`,
      poses: `${LOG_BASE}/city_SE3_egovehicle.feather`,
    }

    const results = document.getElementById('results')
    const runBtn = document.getElementById('runBtn')

    function addSection(title) {
      const h2 = document.createElement('h2')
      h2.textContent = title
      results.appendChild(h2)
    }

    function addResult(title, status, details) {
      const div = document.createElement('div')
      div.className = `test ${status}`
      div.innerHTML = `<h3>${title}</h3><pre>${details}</pre>`
      results.appendChild(div)
    }

    function addHtml(html) {
      const div = document.createElement('div')
      div.innerHTML = html
      results.appendChild(div)
    }

    function formatHeaders(res, keys) {
      return keys.map(k => `${k}: ${res.headers.get(k) || '(not present)'}`).join('\n')
    }

    async function runTests() {
      runBtn.disabled = true
      runBtn.textContent = 'Running...'
      results.innerHTML = ''

      // Track capabilities, not simple pass/fail
      const caps = {
        simpleGet: false,
        bodyReadable: false,
        rangeRequest: false,
        preflight: false,
        headersReadable: false,
        featherMagic: false,
        listObjects: false,
        bodySize: 0,
      }

      // ─── Test 1: Simple GET ───
      addSection('1. Simple GET — Fetch Real Feather Files')

      for (const [label, url] of Object.entries(TEST_FILES)) {
        try {
          const t0 = performance.now()
          const res = await fetch(url)
          const elapsed = (performance.now() - t0).toFixed(0)
          const acao = res.headers.get('access-control-allow-origin')
          const size = res.headers.get('content-length')

          if (res.ok) caps.simpleGet = true
          if (acao) caps.headersReadable = true

          addResult(
            `GET ${label}.feather \u2192 ${res.status} (${elapsed}ms)`,
            res.ok ? 'pass' : 'fail',
            `URL: ${url}\n` +
            `Status: ${res.status} ${res.statusText}\n` +
            `Content-Length: ${size ? (Number(size)/1024).toFixed(1) + ' KB' : '(not present \u2014 header opaque without CORS)'}\n` +
            `Access-Control-Allow-Origin: ${acao || '(not present)'}\n\n` +
            (res.ok
              ? `\u2192 HTTP 200 OK. File is publicly accessible.${acao ? '' : '\n  Note: No CORS header, but body may still be readable (public S3 behavior).'}`
              : `\u2192 Request failed.`)
          )
        } catch (e) {
          addResult(
            `GET ${label}.feather \u2014 FAILED`,
            'fail',
            `URL: ${url}\nError: ${e.message}\n\n\u2192 Fetch completely blocked (network error or strict CORS).`
          )
        }
      }

      // ─── Test 2: Body Read ───
      addSection('2. Response Body — Can JavaScript Read the Data?')

      try {
        const url = TEST_FILES.poses
        const t0 = performance.now()
        const res = await fetch(url)
        if (res.ok) {
          const buf = await res.arrayBuffer()
          const elapsed = (performance.now() - t0).toFixed(0)
          caps.bodyReadable = true
          caps.bodySize = buf.byteLength

          const magic = new Uint8Array(buf, 0, 6)
          const magicStr = String.fromCharCode(...magic)
          caps.featherMagic = magicStr === 'ARROW1'

          addResult(
            `Read arrayBuffer(): ${(buf.byteLength/1024).toFixed(1)} KB in ${elapsed}ms`,
            'pass',
            `ArrayBuffer.byteLength: ${buf.byteLength}\n` +
            `Magic bytes [0..5]: ${magicStr} ${caps.featherMagic ? '\u2713 Valid Arrow IPC (Feather)' : '\u2717 Unexpected format'}\n\n` +
            `\u2192 Response body IS readable from JavaScript \u2713\n` +
            `  This is the critical test. Even without Access-Control-Allow-Origin,\n` +
            `  public S3 allows response body reads for simple (non-preflighted) requests.`
          )
        } else {
          addResult(`Body read \u2192 ${res.status}`, 'fail', `HTTP error: ${res.statusText}`)
        }
      } catch (e) {
        addResult(
          'Body read \u2014 FAILED',
          'fail',
          `Error: ${e.message}\n\n\u2192 Browser blocked reading the response body.\n  This would mean URL-based loading cannot work without a CORS proxy.`
        )
      }

      // ─── Test 3: Range Request ───
      addSection('3. Range Request — HTTP 206 Partial Content')

      try {
        const url = TEST_FILES.annotations
        const res = await fetch(url, { headers: { 'Range': 'bytes=0-1023' } })

        if (res.ok || res.status === 206) {
          const buf = await res.arrayBuffer()
          caps.rangeRequest = true

          addResult(
            `Range GET \u2192 ${res.status} (body: ${buf.byteLength} bytes)`,
            'pass',
            `URL: ${url}\n` +
            `Status: ${res.status}\n` +
            `Content-Range: ${res.headers.get('content-range') || '(opaque)'}\n` +
            `Body size: ${buf.byteLength} bytes\n\n` +
            `\u2192 Range request succeeded \u2713\n  Server returned partial content and body is readable.`
          )
        } else {
          addResult(`Range GET \u2192 ${res.status}`, 'fail', `Unexpected status: ${res.status}`)
        }
      } catch (e) {
        addResult(
          'Range GET \u2014 FAILED',
          'fail',
          `Error: ${e.message}\n\n` +
          `\u2192 Range header triggers a CORS preflight (OPTIONS) which the bucket rejects.\n` +
          `  This is expected for S3 buckets without CORS configuration.\n\n` +
          `  Impact: hyparquet (Parquet random access) won't work directly.\n` +
          `  But AV2 uses Feather files (full GET), so this does NOT block AV2 URL loading.`
        )
      }

      // ─── Test 4: Preflight OPTIONS ───
      addSection('4. Preflight OPTIONS — CORS Negotiation')

      try {
        const url = TEST_FILES.annotations
        const res = await fetch(url, {
          method: 'OPTIONS',
          headers: {
            'Origin': window.location.origin,
            'Access-Control-Request-Method': 'GET',
            'Access-Control-Request-Headers': 'Range',
          },
        })
        const acao = res.headers.get('access-control-allow-origin')
        const acah = res.headers.get('access-control-allow-headers')

        if (acao && acah) caps.preflight = true

        addResult(
          `OPTIONS \u2192 ${res.status}`,
          acao && acah ? 'pass' : 'fail',
          formatHeaders(res, [
            'access-control-allow-origin',
            'access-control-allow-methods',
            'access-control-allow-headers',
            'access-control-max-age',
          ]) + '\n\n' + (acao && acah
            ? `\u2192 Preflight accepted \u2713`
            : `\u2192 Preflight rejected. No CORS config on bucket.`)
        )
      } catch (e) {
        addResult(
          'OPTIONS preflight \u2014 FAILED',
          'info',
          `Error: ${e.message}\n\n` +
          `\u2192 S3 bucket has no CORS configuration.\n` +
          `  Preflight requests (OPTIONS) are completely rejected.\n\n` +
          `  This only blocks requests with custom headers (e.g. Range).\n` +
          `  Simple GET requests still work for public buckets.`
        )
      }

      // ─── Test 5: S3 ListObjectsV2 ───
      addSection('5. S3 ListObjectsV2 — Directory Listing (Could Replace manifest.json)')

      try {
        // List LiDAR files in the log's sensors/lidar/ directory
        const listUrl = `${BASE}?list-type=2&prefix=datasets/av2/sensor/train/${LOG_ID}/sensors/lidar/&delimiter=/&max-keys=10`
        const t0 = performance.now()
        const res = await fetch(listUrl)
        const elapsed = (performance.now() - t0).toFixed(0)

        if (res.ok) {
          const xml = await res.text()
          caps.listObjects = true

          // Parse XML to extract file keys
          const parser = new DOMParser()
          const doc = parser.parseFromString(xml, 'text/xml')
          const keys = [...doc.querySelectorAll('Contents > Key')].map(k => k.textContent)
          const truncated = doc.querySelector('IsTruncated')?.textContent === 'true'
          const keyCount = doc.querySelector('KeyCount')?.textContent

          addResult(
            `ListObjectsV2 \u2192 ${res.status} (${elapsed}ms, ${keyCount} keys)`,
            'pass',
            `URL: ${listUrl}\n` +
            `Keys returned: ${keyCount}\n` +
            `IsTruncated: ${truncated}\n\n` +
            `Sample files:\n${keys.map(k => '  ' + k.split('/').pop()).join('\n')}\n\n` +
            `\u2192 S3 directory listing works \u2713\n` +
            `  This means we can discover LiDAR timestamps and camera files\n` +
            `  directly from S3 \u2014 potentially removing the need for manifest.json.\n\n` +
            `  Frame discovery: parse filenames like "315968261659927216.feather"\n` +
            `  to extract nanosecond timestamps, then construct camera URLs.`
          )
        } else {
          addResult(`ListObjectsV2 \u2192 ${res.status}`, 'warn',
            `Status: ${res.status}\n` +
            `The bucket may not allow unauthenticated listing.\n` +
            `manifest.json will be required for frame discovery.`)
        }
      } catch (e) {
        addResult(
          'ListObjectsV2 \u2014 FAILED',
          'warn',
          `Error: ${e.message}\n\n` +
          `\u2192 Directory listing is not available (CORS or permission issue).\n` +
          `  manifest.json will be required for URL-mode frame discovery.`
        )
      }

      // Also test listing camera directory to see structure
      try {
        const camListUrl = `${BASE}?list-type=2&prefix=datasets/av2/sensor/train/${LOG_ID}/sensors/cameras/ring_front_center/&delimiter=/&max-keys=5`
        const res = await fetch(camListUrl)
        if (res.ok) {
          const xml = await res.text()
          const parser = new DOMParser()
          const doc = parser.parseFromString(xml, 'text/xml')
          const keys = [...doc.querySelectorAll('Contents > Key')].map(k => k.textContent)
          const keyCount = doc.querySelector('KeyCount')?.textContent

          addResult(
            `Camera listing (ring_front_center) \u2192 ${keyCount} files`,
            'pass',
            `Sample camera files:\n${keys.map(k => '  ' + k.split('/').pop()).join('\n')}\n\n` +
            `\u2192 Camera directory also listable \u2713\n` +
            `  Can discover per-camera timestamps for nearest-match to LiDAR.`
          )
        }
      } catch (e) {
        // Non-critical, don't increment fail count
        addResult('Camera listing', 'info', `Not available: ${e.message}`)
      }

      // ─── Summary Table ───
      addSection('6. Summary — Capability Matrix')

      addHtml(`
        <table>
          <tr><th>Capability</th><th>Status</th><th>Impact on Perception Studio</th></tr>
          <tr>
            <td>Simple GET (full file)</td>
            <td class="${caps.simpleGet ? 'yes' : 'no'}">${caps.simpleGet ? '\u2705 Works' : '\u274c Blocked'}</td>
            <td>${caps.simpleGet ? 'Feather, JPEG, JSON \u2014 all AV2 files fetchable' : 'Nothing works'}</td>
          </tr>
          <tr>
            <td>Body readable (arrayBuffer)</td>
            <td class="${caps.bodyReadable ? 'yes' : 'no'}">${caps.bodyReadable ? '\u2705 Works' : '\u274c Blocked'}</td>
            <td>${caps.bodyReadable ? 'Can parse fetched files in JavaScript' : 'Data fetched but unreadable'}</td>
          </tr>
          <tr>
            <td>Feather magic bytes valid</td>
            <td class="${caps.featherMagic ? 'yes' : 'na'}">${caps.featherMagic ? '\u2705 ARROW1' : '\u2796 N/A'}</td>
            <td>${caps.featherMagic ? 'flechette/Arrow IPC parser will work' : ''}</td>
          </tr>
          <tr>
            <td>Range requests (206)</td>
            <td class="${caps.rangeRequest ? 'yes' : 'no'}">${caps.rangeRequest ? '\u2705 Works' : '\u274c Blocked'}</td>
            <td>${caps.rangeRequest ? 'hyparquet can do random access' : 'Not needed for AV2 (Feather = full GET). Only affects Waymo (Parquet).'}</td>
          </tr>
          <tr>
            <td>Response headers readable</td>
            <td class="${caps.headersReadable ? 'yes' : 'no'}">${caps.headersReadable ? '\u2705 Exposed' : '\u274c Opaque'}</td>
            <td>${caps.headersReadable ? 'Content-Length available for progress bars' : 'Use manifest.json for file count/progress instead of Content-Length'}</td>
          </tr>
          <tr>
            <td>CORS preflight (OPTIONS)</td>
            <td class="${caps.preflight ? 'yes' : 'no'}">${caps.preflight ? '\u2705 Accepted' : '\u274c Rejected'}</td>
            <td>${caps.preflight ? 'Full CORS support' : 'Only affects Range/custom headers. Simple GET unaffected.'}</td>
          </tr>
          <tr>
            <td>S3 ListObjectsV2</td>
            <td class="${caps.listObjects ? 'yes' : 'no'}">${caps.listObjects ? '\u2705 Works' : '\u274c Blocked'}</td>
            <td>${caps.listObjects ? 'Can discover frames from S3 directly \u2014 manifest.json optional!' : 'Need manifest.json for frame discovery'}</td>
          </tr>
        </table>
      `)

      // ─── Verdict ───
      const div = document.createElement('div')
      if (caps.simpleGet && caps.bodyReadable) {
        div.className = 'summary ok'
        div.innerHTML = `
          \u2705 AV2 URL-based loading WILL WORK<br><br>
          <span style="font-size:14px;font-weight:normal;color:#8b949e">
            Simple GET + body read succeeds on this public S3 bucket.<br>
            All AV2 data is Feather/JPEG (no Range requests needed).<br><br>
            <strong>What works:</strong> calibration, poses, annotations, LiDAR sweeps, camera images<br>
            <strong>What doesn't:</strong> Response headers (Content-Length) are opaque \u2014 use manifest.json for progress<br>
            <strong>Not needed:</strong> Range requests (only required for Waymo Parquet, which is self-hosted)
          </span>
        `
      } else if (caps.simpleGet) {
        div.className = 'summary partial'
        div.innerHTML = `
          \u26a0\ufe0f Partial: GET works but body is unreadable<br>
          <span style="font-size:14px;font-weight:normal;color:#8b949e">
            Consider a CORS proxy or CloudFront distribution.
          </span>
        `
      } else {
        div.className = 'summary blocked'
        div.innerHTML = `
          \u274c Fully blocked \u2014 URL loading requires a CORS proxy<br>
          <span style="font-size:14px;font-weight:normal">
            Options: CloudFront distribution, Cloudflare Worker proxy, or self-hosted bucket with CORS.
          </span>
        `
      }
      results.appendChild(div)

      runBtn.disabled = false
      runBtn.textContent = 'Run CORS Tests Again'
    }
  </script>
</body>
</html>
